---
# Reusable workflow: Deploy GitHub Script (Windows)
#
# Purpose:
#   Supports upstream-triggered auto-deployment of a script sourced from a
#   GitHub repository (e.g. mennotech/script) to Windows self-hosted runners.
#   Callers handle repository_dispatch or push triggers and invoke this
#   workflow via workflow_call.
#
# Two deployment rings are supported by passing the appropriate script_ref:
#   - testing ring:  script_ref: testing
#   - broad ring:    script_ref: main  (or a pinned commit SHA)
#
# Ring selection is the caller's responsibility; this workflow is ring-agnostic.
#
# Security:
#   - Secrets are never echoed.
#   - Logs remain in the calling client repository only.

name: Deploy GitHub Script (Windows)

on:
  workflow_call:
    inputs:
      # ------------------------------------------------------------------ #
      # Script repository inputs                                            #
      # ------------------------------------------------------------------ #
      script_repo:
        description: >
          Script repository to check out (e.g. mennotech/script).
        required: true
        type: string

      script_ref:
        description: >
          Git ref in the script repository to deploy: a branch name (e.g. main,
          testing) or a pinned commit SHA. Controls which deployment ring is
          used.
        required: true
        type: string

      # ------------------------------------------------------------------ #
      # Runner and deployment target inputs                                 #
      # ------------------------------------------------------------------ #
      runner_group:
        description: Self-hosted Windows runner group name.
        required: true
        type: string

      destination_path:
        description: Destination path on the Windows target machine.
        required: true
        type: string

      # ------------------------------------------------------------------ #
      # Optional signing and deployment tuning inputs                       #
      # ------------------------------------------------------------------ #
      exclude_dirs:
        description: >
          Comma-separated additional directories to exclude from signing and
          deployment (e.g. logs,cache).
        required: false
        default: ''
        type: string

      include_github_directory:
        description: >
          Include the .github directory in signing and deployment instead of
          excluding it by default.
        required: false
        default: false
        type: boolean

      exclude_files:
        description: >
          Comma-separated additional file patterns to exclude from deployment
          (e.g. *.crt,Config.json).
        required: false
        default: ''
        type: string

      file_match:
        description: Comma-separated file patterns to sign.
        required: false
        default: '*.ps1,*.psm1,*.psd1'
        type: string

      recurse:
        description: Recurse into subdirectories when searching for files to sign.
        required: false
        default: true
        type: boolean

      timestamp_server:
        description: Authenticode timestamp server URL.
        required: false
        default: http://timestamp.digicert.com
        type: string

      robocopy_options:
        description: Comma-separated additional robocopy options.
        required: false
        default: /R:2,/W:2,/NDL,/NFL,/NP
        type: string

    secrets:
      CODESIGN_PFX_BASE64:
        description: Base64-encoded PFX code-signing certificate.
        required: true

      CODESIGN_PFX_PASSWORD:
        description: Password for the PFX code-signing certificate.
        required: true

# Minimal permissions: read access to the calling repository contents only.
permissions:
  contents: read

jobs:
  deploy_script:
    name: Fetch, sign, and deploy script
    runs-on:
      group: ${{ inputs.runner_group }}
      labels:
        - self-hosted
        - windows

    steps:
      # Step 1: Check out the script repository.
      - name: Checkout script repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.script_repo }}
          ref: ${{ inputs.script_ref }}

      # Step 2: Build the effective set of directory and file exclusions,
      # applying the same defaults as sign-and-deploy-windows.yml.
      - name: Resolve effective directory exclusions
        id: exclusion_config
        shell: pwsh
        run: |
          $effectiveExcludeDirs = [System.Collections.Generic.List[string]]::new()

          foreach ($excludeDir in '${{ inputs.exclude_dirs }}' -split ',') {
            $normalizedExcludeDir = $excludeDir.Trim()
            if ([string]::IsNullOrWhiteSpace($normalizedExcludeDir)) {
              continue
            }

            $alreadyIncluded = $effectiveExcludeDirs | Where-Object {
              $_.Equals($normalizedExcludeDir, [System.StringComparison]::OrdinalIgnoreCase)
            }

            if (-not $alreadyIncluded) {
              $effectiveExcludeDirs.Add($normalizedExcludeDir)
            }
          }

          if ('${{ inputs.include_github_directory }}' -ne 'true') {
            $githubDirectoryIncluded = $effectiveExcludeDirs | Where-Object {
              $_.Equals('.github', [System.StringComparison]::OrdinalIgnoreCase)
            }

            if (-not $githubDirectoryIncluded) {
              $effectiveExcludeDirs.Add('.github')
            }
          }

          "exclude_dirs=$($effectiveExcludeDirs -join ',')" >> $env:GITHUB_OUTPUT
          "exclude_files=${{ inputs.exclude_files }}" >> $env:GITHUB_OUTPUT

      # Step 3: Import the Authenticode code-signing certificate onto the runner.
      - name: Import code-signing certificate
        id: import_certificate
        uses: mennotech/github-actions/import-codesigning-cert-windows@v1
        with:
          pfx_base64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          pfx_password: ${{ secrets.CODESIGN_PFX_PASSWORD }}

      # Step 4: Sign all matching PowerShell files in the checked-out
      # repository. Certificate is cleaned up after signing.
      - name: Sign PowerShell files
        uses: mennotech/github-actions/codesign-files-windows@v1
        with:
          path: .
          timestamp_server: ${{ inputs.timestamp_server }}
          recurse: ${{ inputs.recurse }}
          file_match: ${{ inputs.file_match }}
          exclude_dirs: ${{ steps.exclusion_config.outputs.exclude_dirs }}
          cert_thumbprint: ${{ steps.import_certificate.outputs.certificate_thumbprint }}
          cleanup_certificate: true

      # Step 5: Verify that all signed files carry a valid signature before
      # deploying. Fails the job if any file has an invalid or missing signature.
      - name: Verify PowerShell signatures
        uses: mennotech/github-actions/codesign-files-windows@v1
        with:
          path: .
          recurse: ${{ inputs.recurse }}
          file_match: ${{ inputs.file_match }}
          exclude_dirs: ${{ steps.exclusion_config.outputs.exclude_dirs }}
          test_only: true
          fail_on_invalid: true

      # Step 6: Deploy signed script files to the target destination path
      # using robocopy.
      - name: Deploy files
        uses: mennotech/github-actions/deploy-files-windows@v1
        with:
          source_path: .
          destination_path: ${{ inputs.destination_path }}
          exclude_dirs: ${{ steps.exclusion_config.outputs.exclude_dirs }}
          exclude_files: ${{ steps.exclusion_config.outputs.exclude_files }}
          robocopy_options: ${{ inputs.robocopy_options }}

      # Step 7: Dry-run robocopy to confirm that destination matches source
      # after deployment.
      - name: Verify deployment state
        uses: mennotech/github-actions/deploy-files-windows@v1
        with:
          source_path: .
          destination_path: ${{ inputs.destination_path }}
          exclude_dirs: ${{ steps.exclusion_config.outputs.exclude_dirs }}
          exclude_files: ${{ steps.exclusion_config.outputs.exclude_files }}
          robocopy_options: ${{ inputs.robocopy_options }}
          test_only: true
