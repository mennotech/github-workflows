---
name: Validate Workflows

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_yaml:
    name: Validate YAML syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Lint YAML files
        shell: bash
        run: |
          mapfile -t yaml_files < <(find . -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          if [ ${#yaml_files[@]} -eq 0 ]; then
            echo 'No YAML files found.' >&2
            exit 1
          fi

          yamllint -c .yamllint.yml "${yaml_files[@]}"

      - name: Parse workflow YAML files
        shell: bash
        run: |
          ruby <<'RUBY'
          require 'yaml'

          files = Dir.glob('.github/workflows/*.yml').sort
          abort('No workflow files found.') if files.empty?

          files.each do |file_path|
            YAML.load_file(file_path)
            puts "Validated #{file_path}"
          end
          RUBY

      - name: Verify reusable workflow references published actions
        shell: python
        run: |
          from pathlib import Path

          workflow = Path('.github/workflows/sign-and-deploy-windows.yml').read_text(encoding='utf-8')
          required_refs = [
              'mennotech/github-actions/import-codesigning-cert-windows@v1',
              'mennotech/github-actions/codesign-files-windows@v1',
              'mennotech/github-actions/deploy-files-windows@v1',
          ]

          missing = [ref for ref in required_refs if ref not in workflow]
          if missing:
              raise SystemExit(f'Missing action references: {missing}')

          print('Reusable workflow references expected published actions.')

          deploy_script_workflow = Path(
              '.github/workflows/deploy-github-script-windows.yml'
          ).read_text(encoding='utf-8')
          missing_in_deploy = [ref for ref in required_refs if ref not in deploy_script_workflow]
          if missing_in_deploy:
              raise SystemExit(
                  f'deploy-github-script-windows.yml missing action references: {missing_in_deploy}'
              )

          print('deploy-github-script-windows.yml references expected published actions.')

          private_script_workflow = Path(
              '.github/workflows/deploy-private-github-script-windows.yml'
          ).read_text(encoding='utf-8')
          missing_in_private = [ref for ref in required_refs if ref not in private_script_workflow]
          if missing_in_private:
              raise SystemExit(
                  f'deploy-private-github-script-windows.yml missing action references: {missing_in_private}'
              )

          print('deploy-private-github-script-windows.yml references expected published actions.')
